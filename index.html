<!DOCTYPE html>
<html lang= zh-CN>
<head>
    <meta charset=UTF-8>
    <meta name=viewport content=width=device-width initial-scale=1.0>
    <title>我的个人主页</title>
    <link rel=stylesheet href=style.css>
    <link href=https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css rel=stylesheet>
</head>
<body>
    <div class=container>
        <div class=profile>
            <div class=avatar>
                <img src=https://picsum.photos/200/200 alt=头像>
            </div>
            <h1 class=name>你的名字</h1>
            <p class=bio>这里写你的个人简介，比如：程序员 / 设计爱好者 / 摄影爱好者</p>
            <div class=social-links>
                <a href=https://github.com/CassiusZhao target=_blank><i class=fa fa-github></i></a>
                <a href=https://twitter.com/你的推特用户名 target=_blank><i class=fa fa-twitter></i></a>
                <a href=mailto:你的邮箱地址><i class=fa fa-envelope></i></a>
                <a href=https://你的博客地址 target=_blank><i class=fa fa-globe></i></a>
            </div>
        </div>
        <div class=section>
            <h2>关于我</h2>
            <p>这里写关于你的介绍，比如你擅长的技术、兴趣爱好、个人经历等等。</p>
        </div>
        <div class=section>
            <h2>项目作品</h2>
            <div class=projects>
                <div class=project-card>
                    <h3>项目1名称</h3>
                    <p>项目1的介绍，比如：一个基于Python的自动化工具，帮助提升工作效率。</p>
                    <a href=项目1地址 target=_blank>查看详情 →</a>
                </div>
                <div class=project-card>
                    <h3>项目2名称</h3>
                    <p>项目2的介绍，比如：一个前端开发的个人博客网站，支持响应式访问。</p>
                    <a href=项目2地址 target=_blank>查看详情 →</a>
                </div>
            </div>
        </div>
        <div class=section>
            <h2>联系方式</h2>
            <p>邮箱：your-email@example.com</p>
            <p>微信：your-wechat-id</p>
        </div>
        <div class=footer>
            <p>© 2024 你的名字. Powered by GitHub Pages.</p>
        </div>
    </div>
</body>
</html>
